name: Link Check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install markdown-link-check
        run: npm install -g markdown-link-check@3.12.2
      - name: Cache check results
        uses: actions/cache@v5
        with:
          path: .mlc_cache.json
          key: cache-mlc-${{ github.sha }}
          restore-keys: cache-mlc-
      - name: Run markdown-link-check
        run: |
          if [ -f .mlc_cache.json ]; then
            markdown-link-check README.md --config .mlcrc.json --cache .mlc_cache.json
          else
            markdown-link-check README.md --config .mlcrc.json
          fi
      - name: Show cache
        run: cat .mlc_cache.json 2>/dev/null || echo "No cache"